version: '3.8'

networks:
  observability:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  sqlserver_data:

services:
  sqlserverdb:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_PASSWORD:-StrongPassword123!!}
      - MSSQL_PID=Express
    ports:
      - "5055:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./sql/init.sql:/init.sql           # Mount init script
      - ./sql/entrypoint.sh:/entrypoint.sh # Mount entrypoint
    networks:
      - observability
    entrypoint: ["/bin/bash", "/entrypoint.sh"] 
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${DB_PASSWORD:-StrongPassword123!!}' -C -Q 'SELECT 1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s


    # ─── Application ────────────────────────────────────────────────────────────
  efcore-api:
    build:
      context: ../../
      dockerfile: Deployments/Docker/Dockerfile.efcoreapi
      target: final
    container_name: efcore-api
    environment:
      
      - ASPNETCORE_ENVIRONMENT=Production
    ports:
      - "8080:8080"
    depends_on:
      sqlserverdb:
        condition: service_healthy
    networks:
      - observability
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


  # ─── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - observability
    restart: unless-stopped

  # ─── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      # Provision datasources and dashboards automatically
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - observability
    restart: unless-stopped

      # ─── Grafana ────────────────────────────────────────────────────────────────
  k6:
    image: grafana/k6:latest
    container_name: k6
    volumes:
      - ./monitoring/k6//loadtest.js:/scripts/loadtest.js
    command: run /scripts/loadtest.js
    networks:
      - observability
    depends_on:
      efcore-api:
        condition: service_healthy
    # profiles:
    #   - testing





# The profiles: testing means k6 won't start with normal docker-compose up -d — only when you explicitly run it.




# This mounts the entire dashboards folder from your host into Grafana's container. So any .json file you drop in Deployments/Docker/monitoring/grafana/dashboards/ — including efcore-dashboard.json — will automatically appear at /var/lib/grafana/dashboards/efcore-dashboard.json inside the container.
# And your provisioning config in efcore.yml tells Grafana to scan exactly that path:
# yamloptions:
#   path: /var/lib/grafana/dashboards
# ```

# So the full chain is:
# ```
# Your host file:
#   Deployments/Docker/monitoring/grafana/dashboards/efcore-dashboard.json
#         ↓  (docker volume mount)
# Inside container:
#   /var/lib/grafana/dashboards/efcore-dashboard.json
#         ↓  (Grafana provisioner reads this directory every 30s)
# Grafana UI:
#   Dashboard auto-appears under "EFCore Dashboards"


# grafana:
#   volumes:
#     - grafana_data:/var/lib/grafana                              # named volume (persists Grafana DB, plugins, etc.)
#     - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro   # bind mount
#     - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro   # bind mount
# ```

# The `./` is **relative to where your `docker-compose.yml` lives**, which is:
# ```
# Deployments/Docker/docker-compose.yml
# ```

# So the resolved absolute paths on your host are:

# | docker-compose path | Absolute host path | Container path |
# |---|---|---|
# | `./monitoring/grafana/provisioning` | `Deployments/Docker/monitoring/grafana/provisioning` | `/etc/grafana/provisioning` |
# | `./monitoring/grafana/dashboards` | `Deployments/Docker/monitoring/grafana/dashboards` | `/var/lib/grafana/dashboards` |

# So your final folder structure should look like this:
# ```
# Deployments/
# └── Docker/
#     ├── docker-compose.yml
#     └── monitoring/
#         └── grafana/
#             ├── provisioning/
#             │   ├── datasources/
#             │   │   └── prometheus.yml
#             │   └── dashboards/
#             │       └── efcore.yml
#             └── dashboards/
#                 └── efcore-dashboard.json   ← dashboard goes here



# 🛠️ SQL Server Docker Troubleshooting Reference
# 1. Status & Logs
# Check if the container is running and if the initialization script finished.
#     Check Status: docker ps (Look for (healthy))
#     View Logs: docker logs sqlserver
#     Follow Logs: docker logs -f sqlserver

# 2. External Connectivity (SSMS / Azure Data Studio)
# If you cannot connect from your host machine, verify these settings:
#     Server: localhost,5055
#     Authentication: SQL Server Authentication
#     Login: sa
#     Password: ${DB_PASSWORD} (Default: StrongPassword123!!)
#     Encryption: Set Trust Server Certificate to True (Required for SQL 2022).

# 3. Internal Verification (CLI)
# Run these commands directly in your terminal to query the database inside the container.
#     Note: We use /opt/mssql-tools18/ and the -C flag to bypass SSL certificate restrictions.

# Goal	Command
# Check Version	docker exec -it sqlserver /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "StrongPassword123!!" -C -Q "SELECT @@VERSION"
# List Databases	docker exec -it sqlserver /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "StrongPassword123!!" -C -Q "SELECT name FROM sys.databases"
# Check 'khaled' User	docker exec -it sqlserver /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "StrongPassword123!!" -C -Q "SELECT name FROM sys.server_principals WHERE name = 'khaled'"

# 4. Common Fixes
#     Permission Denied: If entrypoint.sh fails, run chmod +x sql/entrypoint.sh on your host.
#     Fresh Start: To wipe the database and start over:
#     Bash
#     docker-compose down -v
#     docker-compose up -d
#     Password Change: Update the SA_PASSWORD in docker-compose.yml, then run docker-compose up -d to recreate the container.