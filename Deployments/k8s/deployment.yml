
# Kubernetes Deployment
# Kubernetes introduces a fundamentally different operational model.
# Docker Compose is declarative but single-host. Kubernetes is declarative, distributed, 
# self-healing, and designed for the failure cases Docker Compose ignores entirely.


 # Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: efcore-observability
    labels:
    # Pod Security Standards — restrict privileges at namespace level
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted


