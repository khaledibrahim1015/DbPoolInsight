# helm/monitoring-values.yaml
# ============================================================
# kube-prometheus-stack Helm values for DbPoolInsight
#
# Install:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm install monitoring prometheus-community/kube-prometheus-stack \
#     --namespace dbpoolinsight \
#     --create-namespace \
#     -f helm/monitoring-values.yaml
#
# Upgrade:
#   helm upgrade monitoring prometheus-community/kube-prometheus-stack \
#     --namespace dbpoolinsight \
#     -f helm/monitoring-values.yaml
# ============================================================

# ── Grafana ────────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  adminPassword: admin   # override via --set grafana.adminPassword=<secret> in CI
    # Disable the init container that chowns /var/lib/grafana
  # On Minikube hostPath volumes, leftover dirs from previous runs
  # are owned by root and cause the chown to fail with Permission denied.
  initChownData:
    enabled: false
  service:
    type: ClusterIP   # exposed via Ingress in prod, NodePort in dev

  # ── Persistence ──────────────────────────────────────────────────────────
  persistence:
    enabled: true
    size: 2Gi

  # ── Sidecar: disable the chart's built-in default Prometheus datasource ──
  # This prevents a conflict where both the chart's auto-generated datasource
  # and our custom one below are both marked isDefault: true, which causes
  # Grafana to crash with "Only one datasource per organization can be marked
  # as default".
  sidecar:
    datasources:
      defaultDatasourceEnabled: false

  # ── Datasource: static provisioning (replaces additionalDataSources) ─────
  # Using 'datasources' instead of 'additionalDataSources' avoids the sidecar
  # conflict. The deleteDatasources block ensures any stale entry from a
  # previous install is cleaned up before the new one is written.
  datasources:
    datasources.yaml:
      apiVersion: 1
      deleteDatasources:
        - name: Prometheus
          orgId: 1
      datasources:
        - name: Prometheus
          type: prometheus
          uid: prometheus          # matches the UID in your dashboard JSON
          url: http://monitoring-kube-prometheus-prometheus:9090
          access: proxy
          isDefault: true
          editable: true
          jsonData:
            timeInterval: "15s"
            queryTimeout: "60s"
            httpMethod: POST

  # ── Dashboard provisioning ────────────────────────────────────────────────
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: dbpoolinsight
          orgId: 1
          type: file
          disableDeletion: false
          updateIntervalSeconds: 30
          allowUiUpdates: true
          options:
            path: /var/lib/grafana/dashboards/dbpoolinsight

  # ── Auto-load your efcore dashboard from a ConfigMap ─────────────────────
  dashboardsConfigMaps:
    dbpoolinsight: "efcore-dashboard-configmap"
  # You create this ConfigMap with:
  #   kubectl create configmap efcore-dashboard-configmap \
  #     --from-file=efcore-dashboard.json=Deployments/Docker/monitoring/grafana/dashboards/efcore-dashboard.json \
  #     -n dbpoolinsight

  livenessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 120    # give migrations time to finish
    timeoutSeconds: 30
    periodSeconds: 30
    failureThreshold: 10

  readinessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 60
    timeoutSeconds: 30
    periodSeconds: 10
    failureThreshold: 10

# ── Prometheus ─────────────────────────────────────────────────────────────────
prometheus:
  enabled: true

  prometheusSpec:
    # ── Retention ────────────────────────────────────────────────────────────
    retention: 15d
    retentionSize: "4GB"

    # ── Storage ──────────────────────────────────────────────────────────────
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

    # ── Scrape interval to match your efcore-api metrics ─────────────────────
    scrapeInterval: "5s"
    evaluationInterval: "15s"

    additionalRulesForClusterRole: []

# ── Alertmanager ───────────────────────────────────────────────────────────────
alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

# ── Disable components we don't need ──────────────────────────────────────────
kubeStateMetrics:
  enabled: true   # useful cluster-level metrics

nodeExporter:
  enabled: true   # per-node CPU/memory/disk metrics

kubeApiServer:
  enabled: false  # not needed for app-level observability

kubeEtcd:
  enabled: false

kubeScheduler:
  enabled: false

kubeControllerManager:
  enabled: false