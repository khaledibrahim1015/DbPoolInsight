apiVersion: v1
kind: Secret
metadata:
  name: dbpoolinsight-secrets
  namespace: dbpoolinsight
  labels:
    app.kubernetes.io/part-of: dbpoolinsight
type: Opaque
stringData:
  # SQL Server SA password (must meet complexity: 8+ chars, upper, lower, digit, symbol)
  SA_PASSWORD: "StrongPassword123!!"

