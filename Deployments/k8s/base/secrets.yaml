# ============================================================
# secrets.yaml — TEMPLATE ONLY
# ============================================================
# NEVER commit real passwords to git.
#
# Option A (local/dev): fill in values below and apply manually
#   kubectl apply -f k8s/base/secrets.yaml -n dbpoolinsight
#
# Option B (production): use Sealed Secrets or External Secrets
#   See: https://github.com/bitnami-labs/sealed-secrets
#
# Option C (CI/CD): inject via pipeline env vars using scripts/create-secrets.sh
# ============================================================


apiVersion: v1
kind: Secret
metadata:
  name: dbpoolinsight-secrets
  namespace: dbpoolinsight
  labels:
    app.kubernetes.io/part-of: dbpoolinsight
type: Opaque
stringData:
  # ── SQL Server SA password ────────────────────────────────────────────────
  # FIX: In production, do NOT commit real passwords here.
  #      Use Sealed Secrets, External Secrets Operator, or a Vault integration.
  #      For local/dev: override via overlay patch or `kubectl create secret`.
  SA_PASSWORD: "StrongPassword123!!"


 # ── EFCore API connection strings ─────────────────────────────────────────
  # Format: "Server=<host>;Database=<db>;User Id=<user>;Password=<pass>;TrustServerCertificate=True"
  # The k8s DNS name for SQL Server is "sqlserverdb" (matches the Service metadata.name)
  TMS_Conn: "Server=sqlserverdb;Database=observabilityDB;User Id=khaled;Password=StrongPassword123!!;Min Pool Size=5;Max Pool Size=200;Pooling=True;TrustServerCertificate=True;"
  TMSReplica_Conn: "Server=sqlserverdb;Database=observabilityDB;User Id=khaled;Password=StrongPassword123!!;Min Pool Size=5;Max Pool Size=100;Pooling=True;TrustServerCertificate=True;"
