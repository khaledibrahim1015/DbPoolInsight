apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-script
  namespace: dbpoolinsight
  labels:
    app.kubernetes.io/part-of: dbpoolinsight
    app.kubernetes.io/component: loadtest
data:
  loadtest.js: |
    import { Trend } from 'k6/metrics';
    import http from 'k6/http';
    import { check, sleep } from 'k6';

    // ── Custom trends per context/mode ──────────────────────────────────────
    const trendPoolSeq     = new Trend('db_pool_seq_duration');
    const trendPoolConcur  = new Trend('db_pool_concur_duration');
    const trendSustained   = new Trend('db_pool_sustained_duration');
    const trendStdSeq      = new Trend('db_std_seq_duration');
    const trendStdConcur   = new Trend('db_std_concur_duration');

    export const options = {
      stages: [
        { duration: '30s', target: 50 },
        { duration: '1m',  target: 50 },
        { duration: '20s', target: 0  },
      ],
      thresholds: {
        'http_req_duration':          ['p(95)<2500'],
        'db_pool_sustained_duration': ['p(95)<3000'],
      },
    };

    // In-cluster: use Service DNS name, not a host IP
    const BASE_URL = 'http://efcore-api:8080';

    export default function () {
      const vuId = __VU % 5;

      if (vuId === 0) {
        const res = http.post(`${BASE_URL}/api/pool/test/sequential?requests=5&delayMs=20`, null);
        check(res, { 'pool_seq_ok': (r) => r.status === 200 });
        trendPoolSeq.add(res.timings.duration);
      }
      else if (vuId === 1) {
        const res = http.post(`${BASE_URL}/api/pool/test/concurrent?parallelRequests=5&delayMs=50`, null);
        check(res, { 'pool_concur_ok': (r) => r.status === 200 });
        trendPoolConcur.add(res.timings.duration);
      }
      else if (vuId === 2) {
        const res = http.post(`${BASE_URL}/api/standard/test/sequential?requests=5&delayMs=20`, null);
        check(res, { 'std_seq_ok': (r) => r.status === 200 });
        trendStdSeq.add(res.timings.duration);
      }
      else if (vuId === 3) {
        const res = http.post(`${BASE_URL}/api/standard/test/concurrent?parallelRequests=5&delayMs=50`, null);
        check(res, { 'std_concur_ok': (r) => r.status === 200 });
        trendStdConcur.add(res.timings.duration);
      }
      else {
        const res = http.get(`${BASE_URL}/api/pooldiagnostics/sustained-high-load?waves=1&requestsPerWave=10&delayMs=100`);
        check(res, { 'sustained status 200': (r) => r.status === 200 });
        trendSustained.add(res.timings.duration);
      }

      sleep(1);
    }