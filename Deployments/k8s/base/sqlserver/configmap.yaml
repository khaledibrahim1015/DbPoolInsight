apiVersion: v1
kind: ConfigMap
metadata:
  name: sqlserver-init
  namespace: dbpoolinsight
  labels:
    app.kubernetes.io/part-of: dbpoolinsight
    app.kubernetes.io/component: sqlserver
data:

  # ── init.sql ─────────────────────────────────────────────────────────────
  # Idempotent: safe to run multiple times (uses IF NOT EXISTS guards)
  init.sql: |
    -- Create database
    IF NOT EXISTS (SELECT * FROM sys.databases WHERE name = 'observabilityDB')
    BEGIN
        CREATE DATABASE observabilityDB;
        PRINT 'Database observabilityDB created.';
    END
    ELSE
        PRINT 'Database observabilityDB already exists — skipping.';
    GO

    USE observabilityDB;
    GO

    -- Create login
    IF NOT EXISTS (SELECT * FROM sys.server_principals WHERE name = 'khaled')
    BEGIN
        CREATE LOGIN khaled WITH PASSWORD = 'StrongPassword123!!';
        PRINT 'Login khaled created.';
    END
    GO

    -- Create user and grant db_owner
    IF NOT EXISTS (SELECT * FROM sys.database_principals WHERE name = 'khaled')
    BEGIN
        CREATE USER khaled FOR LOGIN khaled;
        ALTER ROLE db_owner ADD MEMBER khaled;
        PRINT 'User khaled created and granted db_owner.';
    END
    GO

    PRINT 'Database initialization completed successfully.';
    GO

  # ── entrypoint.sh ──────────────────────────────────────────────────────────
  # Starts SQL Server in the background, waits for it to be ready,
  # then runs init.sql to create the database and user.
  # deprected use job instead of init container to run this script once at startup, then exit
  entrypoint.sh: |
    #!/bin/bash
    set -e
    # Start SQL Server in the background
    /opt/mssql/bin/sqlservr &
    # Wait for SQL Server to be ready
     echo "Waiting for SQL Server to accept connections..."

     for i in $(seq 1 60); do
      /opt/mssql-tools18/bin/sqlcmd \
        -S localhost -U sa -P "$SA_PASSWORD" -C \
        -Q "SELECT 1" > /dev/null 2>&1
      if [ $? -eq 0 ]; then
        echo "SQL Server is UP after ${i} attempts"
        break
      fi
      echo "  attempt $i/60 — still starting, sleeping 2s..."
      sleep 2
    done

    # Run the initialization script
    echo "Running database initialization..."
    /opt/mssql-tools18/bin/sqlcmd \
      -S localhost -U sa -P "$SA_PASSWORD" -C \
      -i /scripts/init.sql

    echo "Initialization complete. Handing off to SQL Server process."
     # Keep the container running
    wait 